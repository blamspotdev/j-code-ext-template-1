id: jcode.templates
name: JCode Project Templates
publisher: jcode
version: 0.3.0
type: templates
description: >-
  First-party project templates scaffolded on-device by the embedded runtime.
  Each template under templates/<id>/ is self-contained.
templates:
  - empty
  - aspnet-vite-react-ts
  - aspnet-webapi
  - blazor-app
  - angular-aspnet
  - react-app
  - nextjs-app
  - node-express-api
  - fastapi-app
  - flask-app
