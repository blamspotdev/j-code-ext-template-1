id: angular-aspnet
name: Angular and ASP.NET Core
description: >-
  An Angular client served by an ASP.NET Core minimal-API server. The client is
  built into the server's wwwroot; its editable source is copied into the project.
requires:
  - dotnet
  - nodejs
recipe:
  - label: Install Angular CLI
    run: npm install -g @angular/cli
  - label: Create ASP.NET Core server
    run: dotnet new web -o "{{projectDir}}/Server"
  - label: Scaffold Angular client
    workdir: "{{hostStaging}}"
    run: ng new client --skip-git --defaults --skip-install
  - label: Install client dependencies
    workdir: "{{hostStaging}}/client"
    run: npm install
  - label: Build client
    workdir: "{{hostStaging}}/client"
    run: ng build
  - label: Publish client into server wwwroot
    run: mkdir -p "{{projectDir}}/Server/wwwroot" && cp -r "{{hostStaging}}/client/dist/client/browser/." "{{projectDir}}/Server/wwwroot/" 2>/dev/null || cp -r "{{hostStaging}}/client/dist/." "{{projectDir}}/Server/wwwroot/"
  - label: Copy client source into project
    run: cd "{{hostStaging}}/client" && tar --exclude=node_modules --exclude=dist -cf - . | (mkdir -p "{{projectDir}}/client" && cd "{{projectDir}}/client" && tar -xf -)
