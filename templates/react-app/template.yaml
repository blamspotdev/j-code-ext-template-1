id: react-app
name: React App
description: >-
  A React single-page app scaffolded with Vite. The editable source is copied
  into the project; the initial install runs on the runtime's ext4 home (FUSE
  storage has no symlinks, so node_modules cannot live under /workspace).
requires:
  - nodejs
recipe:
  - label: Scaffold React (Vite) app
    workdir: "{{hostStaging}}"
    run: CI=1 npm create vite@latest app -- --template react </dev/null
  - label: Install dependencies
    workdir: "{{hostStaging}}/app"
    run: npm install
  - label: Copy app source into project
    run: cd "{{hostStaging}}/app" && tar --exclude=node_modules -cf - . | (cd "{{projectDir}}" && tar -xf -)
