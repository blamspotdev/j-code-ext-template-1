id: react-app
name: React App
description: A React single-page app scaffolded with Vite.
requires:
  - nodejs
recipe:
  - label: Scaffold React (Vite) app
    workdir: "{{hostStaging}}"
    run: CI=1 npm create vite@latest app -- --template react </dev/null
  - label: Install dependencies
    workdir: "{{hostStaging}}/app"
    run: npm install
  - label: Copy app source into project
    run: cd "{{hostStaging}}/app" && tar --exclude=node_modules -cf - . | (cd "{{projectDir}}" && tar -xf -)
  - label: Configure Build & Run
    run: |
      mkdir -p "{{projectDir}}/.jcode"
      cat > "{{projectDir}}/.jcode/run.yaml" <<'YAML'
      version: 1
      name: Vite / React dev server
      readyPort: 5173
      terminals:
        - label: Client
          command: |
            clear
            set -e
            CLIENT="{{projectDir}}"
            STAGE="$HOME/.jcode-run/{{name}}-client"
            echo '== J Code: Client (Vite dev server) =='
            export npm_config_fund=false npm_config_audit=false
            echo '[1/2] Staging client + installing deps (npm install)...'
            rm -rf "$STAGE" && mkdir -p "$STAGE" && cp -a "$CLIENT/." "$STAGE/"
            cd "$STAGE"
            npm install
            echo '[2/2] Starting Vite dev server on http://localhost:5173 ...'
            npm run dev -- --host 0.0.0.0 --port 5173
      YAML
